<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boys Fashion Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">
    <span class="logo-m">M</span>&
    <span class="logo-r">R</span>
</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">New</a>
        <a href="#">Trend</a>
        <a href="#">Sale</a>
    </nav>
    <div class="cart">Cart <span>4</span></div>
</header>

<!-- HERO SECTION -->
<section class="hero">
    <div class="hero-text">
        <p class="small-text">Trendy Collection’s</p>
        <h1>PREMIUM BOYS<br>FASHION COLLECTION</h1>
        <p class="desc">
            Latest boys fashion wear – shirts, t-shirts, jeans, hoodies  
            with premium quality and modern style.
        </p>

        <div class="stats">
            <div>
                <h2>50k+</h2>
                <p>Customers</p>
            </div>
            <div>
                <h2>8k+</h2>
                <p>Reviews</p>
            </div>
        </div>
    </div>

    <div class="hero-img">
        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=400&q=80" alt="Boy Fashion">
    </div>
</section>

<!-- CATEGORIES -->
<section class="categories">
    <div class="card dark">
        <h3>Boys Gallery</h3>
        <a href="#">Go Now</a>
    </div>

    <div class="card teal">
        <h3>Casual Wear</h3>
    </div>

    <div class="card red">
        <h3>Formal Wear</h3>
    </div>

    <div class="card yellow">
        <h3>Street Style</h3>
    </div>
</section>

</body>
</html>
